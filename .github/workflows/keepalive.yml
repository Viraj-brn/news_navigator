name: F.A.I.T Keepalive

# This workflow runs every 4 days to ping your Render backend.
# Hitting the /api/alerts endpoint automatically queries Supabase,
# which prevents your Supabase free tier database from being paused!

on:
  schedule:
    # Runs at 00:00 UTC every 4 days
    - cron: '0 0 */4 * *'
  workflow_dispatch: # Allows you to run it manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend and Database
        run: |
          # Replace the URL below with your actual Render URL
          curl -X GET "https://news-navigator-hro3.onrender.com/api/alerts"
